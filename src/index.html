<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UVZ Auther - TOTP Manager</title>
  <link rel="stylesheet" href="styles.css">
  <script type="module" src="main.js" defer></script>
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo"></div>
      <h1 class="app-title">UVZ Auther</h1>
      <p class="app-subtitle">Secure TOTP Authentication</p>
      
    </header>

    <!-- Main Content -->
    <main class="app-main">
      <!-- Add Key Dropdown Toggle -->
      <div class="add-key-header">
        <button class="dropdown-toggle" id="toggle-manual-panel" type="button">
          <span class="dropdown-label">Add new key</span>
          <span class="dropdown-hint">Click to show or hide the key form</span>
          <span class="dropdown-icon" aria-hidden="true">▾</span>
        </button>
      </div>

      <!-- Manual Entry Panel (Dropdown Content) -->
      <section class="input-panel" id="manual-panel">
        <h2 class="panel-title">Add Keys</h2>
        
        <div class="form-group">
          <label for="secret-name" class="form-label">Key Name</label>
          <input 
            type="text" 
            id="secret-name" 
            class="form-input" 
            placeholder="e.g., GitHub, Gmail"
            autocomplete="off"
          />
        </div>

        <div class="form-group">
          <label for="secret-value" class="form-label">Secret (Base32)</label>
          <div class="password-input-wrapper">
            <input 
              type="password" 
              id="secret-value" 
              class="form-input" 
              placeholder="Paste Base32 encoded secret"
              autocomplete="off"
            />
            <button class="toggle-password-btn" id="toggle-password" type="button" title="Show/Hide Secret">
              👁️
            </button>
          </div>
          <span class="form-help">Must be Base32 encoded</span>
        </div>

        <button class="btn-primary" id="add-manual-btn">Add Key</button>
      </section>

      <!-- Saved Keys Container -->
      <section class="saved-keys-section">
        <h2 class="panel-title">Your Keys</h2>
        <div class="saved-keys-container" id="keys-container">
          <div class="empty-state">
            <p>No keys added yet.</p>
            <p class="empty-state-hint">Add your first key to get started!</p>
          </div>
        </div>
      </section>
    </main>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>
  </div>
</body>
</html>
