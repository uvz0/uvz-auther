name: "Release the Beast"
on:
  push:
    tags:
      - 'v*' # Triggers when you: git tag v1.0.0 && git push origin v1.0.0
  release:
    types: [published] # Triggers when you click "Publish Release" in the UI
  workflow_dispatch: # Allows you to click a "Run Workflow" button manually for testing

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install # Change to pnpm or yarn if you're a hipster

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # This will be replaced by the actual tag
          releaseName: "UVZ-AUTHER v__VERSION__"
          releaseBody: "If this version breaks your computer, it's a feature, not a bug."
          releaseDraft: true
          prerelease: false
